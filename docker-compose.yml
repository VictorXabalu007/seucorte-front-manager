version: '3.8'

services:
  admin:
    container_name: seucorte_admin
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "5174:5174"
    restart: unless-stopped
    networks:
      - seucorte_network

networks:
  seucorte_network:
    driver: bridge
